[defaults]
inventory               = inventory.yml
host_key_checking       = False
retry_files_enabled     = False
interpreter_python      = auto_silent
forks                   = 10
deprecation_warnings    = False

# YAML-formatted task output (was `stdout_callback = yaml` from
# community.general; removed in v12. Use the built-in default callback
# with `result_format = yaml` instead — works on ansible-core ≥ 2.13).
stdout_callback         = default
result_format           = yaml

[ssh_connection]
pipelining              = True
# rsync (used by `synchronize` module) launches its OWN ssh child — it
# doesn't inherit `host_key_checking = False` from above. Without these
# flags, the FIRST rsync to a new host hangs on the "authenticity of host"
# prompt with no visible output. ControlMaster reuses the auth handshake.
ssh_args                = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s

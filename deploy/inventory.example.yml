# Copy to inventory.yml and fill in your server details.
# Single-host deployment assumed.
all:
  hosts:
    bot:
      ansible_host: 1.2.3.4              # public IP or DNS name
      ansible_user: root                 # SSH user (root or a sudo-able user)
      ansible_ssh_private_key_file: ~/.ssh/id_ed25519
      # ansible_port: 22
      # ansible_become_pass: ...         # if ansible_user is not root
